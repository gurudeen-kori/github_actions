name: Image scanner

on:
  workflow_call: 
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  image-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Clear Trivy cache
        run: rm -rf ~/.cache/trivy

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.33.0
        with:
          image-ref: ${{ vars.DOCKER_USER }}/github-action-app:latest
          severity: CRITICAL,HIGH
          exit-code: 1
      
      - name: Logout from Docker Hub
        if: always()
        run: docker logout
