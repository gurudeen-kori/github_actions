name: Image scanner

on:
  workflow_call:
    secrets:
      DOCKERHUB_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: true

jobs:
  image-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.33.0
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKER_USERNAME }}/github-action-app:latest
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          format: table