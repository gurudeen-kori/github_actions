#docker file scan workflow
name: docker lint

on:
    workflow_call:
jobs:
    docker-lint:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: validate docker file
              uses: uses: hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: ./Dockerfile