name: Job Outputs Demo

on: [push]

jobs:
  set-date:
    runs-on: ubuntu-latest
    outputs:
      today: ${{ steps.date.outputs.today }}

    steps:
      - name: Get today's date
        id: date
        run: echo "today=$(date)" >> $GITHUB_OUTPUT

  use-date:
    runs-on: ubuntu-latest
    needs: set-date

    steps:
      - name: Use output from previous job
        run: echo "Date from previous job: ${{ needs.set-date.outputs.today }}"